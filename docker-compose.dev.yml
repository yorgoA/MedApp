# Database only - for local development with backend run via Maven
services:
  postgres:
    image: postgres:16-alpine
    container_name: medapp-db
    environment:
      POSTGRES_DB: medapp
      POSTGRES_USER: medapp
      POSTGRES_PASSWORD: medapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medapp -d medapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
