services:
  postgres:
    image: postgres:16-alpine
    container_name: medapp-db
    environment:
      POSTGRES_DB: medapp
      POSTGRES_USER: medapp
      POSTGRES_PASSWORD: medapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medapp -d medapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: medapp-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medapp
      DB_USER: medapp
      DB_PASSWORD: medapp
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
